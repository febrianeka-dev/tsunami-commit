<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">

    <title>Visualisasi Tsunami CZML - CesiumJS</title>

    <!-- CESIUM JS -->
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.141/Build/Cesium/Cesium.js"></script>

    <!-- CESIUM CSS -->
    <link
        href="https://cesium.com/downloads/cesiumjs/releases/1.141/Build/Cesium/Widgets/widgets.css"
        rel="stylesheet">

    <style>
        html,
        body,
        #cesiumContainer {

            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;

        }

        .titleBox {

            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-family: Arial, sans-serif;

        }

        .titleBox h2 {

            margin: 0;
            font-size: 18px;

        }

        .titleBox p {

            margin: 5px 0 0 0;
            font-size: 13px;

        }

            .legendBox {

            position: absolute;
            bottom: 80px;
            right: 15px;
            z-index: 999;
            background: rgba(255,255,255,0.9);
            padding: 8px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.4);

        }

        .legendBox img {

            width: 80px;
            height: auto;

        }

        .legendBox h3 {

            margin: 0 0 5px 0;
            font-size: 14px;
            text-align: center;
            font-family: Arial;

        }
        
    </style>

</head>

<body>

    <!-- TITLE -->
    <div class="titleBox">

        <h2>Simulasi Tsunami COMMIT</h2>

        <p>CZML Animation Visualization</p>

    </div>

    <!-- CESIUM CONTAINER -->
    <div id="cesiumContainer"></div>

    <!-- LEGENDA TSUNAMI -->
    <div id="legendBox">

        <img src="./legend.png" alt="Legenda Tsunami">

    </div>
    
    <script type="module">

        // =====================================================
        // CESIUM ACCESS TOKEN
        // =====================================================

        Cesium.Ion.defaultAccessToken =
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiI4MjM4MTg1MS0wZjA1LTQwODUtOTNlYS1jY2FhNTY0MzZmMWYiLCJpZCI6NDMzNDcyLCJpc3MiOiJodHRwczovL2lvbi5jZXNpdW0uY29tIiwiYXVkIjoidW5kZWZpbmVkX2RlZmF1bHQiLCJpYXQiOjE3NzkxODQ3MTh9.SPRsAs1Z54JCEXX0ZyTm4_9RAWylpUeWRl4mIjQfgNM';


        // =====================================================
        // CESIUM VIEWER
        // =====================================================

        const viewer = new Cesium.Viewer('cesiumContainer', {

            terrain: Cesium.Terrain.fromWorldTerrain(),

            animation: true,

            timeline: true,

            shouldAnimate: true,

            baseLayerPicker: true,

            geocoder: true,

            homeButton: true,

            sceneModePicker: true,

            navigationHelpButton: true,

            fullscreenButton: true

        });


        // =====================================================
        // LOAD CZML
        // =====================================================

        const czmlData = await Cesium.CzmlDataSource.load(
            './inundate1.czml'
        );

        viewer.dataSources.add(czmlData);


        // =====================================================
        // ZOOM TO DATA
        // =====================================================

        viewer.zoomTo(czmlData);


        // =====================================================
        // OPTIONAL SETTINGS
        // =====================================================

        // Smooth animation
        viewer.clock.multiplier = 50;

        // Start animation automatically
        viewer.clock.shouldAnimate = true;


        // =====================================================
        // DEBUG
        // =====================================================

        console.log("CZML tsunami loaded successfully");

    </script>

</body>

</html>
